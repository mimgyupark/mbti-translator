<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 카톡 해석기 💬</title>
<meta name="description" content="친구의 카톡을 붙여넣으면 MBTI별 진짜 속마음을 알려드려요">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a14;
    --card: #12121f;
    --card-hover: #1a1a2e;
    --border: #1f1f35;
    --purple: #a78bfa;
    --pink: #f472b6;
    --blue: #60a5fa;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
  }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: #e0e0e0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .hero {
    text-align: center;
    padding: 40px 20px 24px;
    position: relative;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, #a78bfa15 0%, transparent 70%);
    pointer-events: none;
  }

  .hero .badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    background: linear-gradient(135deg, #a78bfa22, #f472b622);
    border: 1px solid #a78bfa33;
    font-size: 12px;
    color: var(--purple);
    margin-bottom: 12px;
  }

  .hero h1 {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, #a78bfa, #f472b6, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .hero p { font-size: 14px; color: #666; line-height: 1.6; }

  /* ===== MAIN LAYOUT ===== */
  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px 120px;
  }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 4px;
    background: var(--card);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }

  .mode-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: #888;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
  }

  .mode-btn.active {
    background: linear-gradient(135deg, #a78bfa22, #f472b622);
    color: #fff;
    box-shadow: 0 2px 12px #a78bfa22;
  }

  /* ===== MBTI GRID ===== */
  .mbti-section { margin-bottom: 16px; }

  .mbti-section .section-title {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    padding-left: 4px;
  }

  .mbti-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .mbti-btn {
    padding: 10px 4px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--card);
    color: #999;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: inherit;
  }

  .mbti-btn:hover {
    border-color: var(--purple);
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 4px 16px #a78bfa11;
  }

  .mbti-btn.active {
    border-color: var(--purple);
    background: linear-gradient(135deg, #a78bfa18, #f472b618);
    color: #fff;
    box-shadow: 0 0 20px #a78bfa22;
  }

  .mbti-btn .emoji { font-size: 18px; display: block; margin-bottom: 3px; }
  .mbti-btn .label { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
  .mbti-btn .desc { font-size: 9px; color: #666; margin-top: 2px; }
  .mbti-btn.active .desc { color: #c4b5fd; }

  /* ===== INPUT ===== */
  .input-section {
    margin-bottom: 16px;
  }

  .input-box {
    position: relative;
  }

  .input-box textarea {
    width: 100%;
    min-height: 80px;
    max-height: 200px;
    padding: 16px;
    padding-right: 70px;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    background: var(--card);
    color: #fff;
    font-size: 14px;
    line-height: 1.6;
    font-family: inherit;
    outline: none;
    resize: vertical;
    transition: border-color 0.2s;
  }

  .input-box textarea:focus { border-color: var(--purple); }
  .input-box textarea::placeholder { color: #444; }

  .send-btn {
    position: absolute;
    right: 10px;
    bottom: 10px;
    padding: 8px 18px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px #7c3aed44; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* ===== RESULT CARDS ===== */
  .results { display: flex; flex-direction: column; gap: 16px; }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card .card-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    background: #ffffff04;
  }

  .card-header .mbti-badge {
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #a78bfa22, #f472b622);
    color: var(--purple);
  }

  .card-header .mbti-name {
    font-size: 13px;
    color: #888;
  }

  .card-header .mbti-emoji {
    font-size: 20px;
  }

  .result-body { padding: 16px; }

  /* Original message bubble */
  .original-msg {
    background: #7c3aed33;
    border-radius: 14px 14px 14px 4px;
    padding: 12px 16px;
    margin-bottom: 14px;
    font-size: 13px;
    color: #c4b5fd;
    line-height: 1.6;
    position: relative;
  }

  .original-msg::before {
    content: '원문';
    position: absolute;
    top: -8px;
    left: 12px;
    font-size: 9px;
    background: var(--card);
    padding: 0 6px;
    color: #666;
    border-radius: 4px;
  }

  /* Decoded sections */
  .decode-section {
    margin-bottom: 14px;
  }

  .decode-section:last-child { margin-bottom: 0; }

  .decode-label {
    font-size: 11px;
    font-weight: 700;
    color: #666;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .decode-label .icon { font-size: 14px; }

  .decode-text {
    font-size: 14px;
    line-height: 1.8;
    color: #ddd;
    padding: 12px 14px;
    background: #ffffff06;
    border-radius: 12px;
    border-left: 3px solid var(--purple);
    word-break: keep-all;
  }

  .decode-text.meaning { border-left-color: var(--pink); }
  .decode-text.emotion { border-left-color: var(--yellow); }
  .decode-text.response { border-left-color: var(--green); }
  .decode-text.caution { border-left-color: var(--red); }

  /* All MBTI comparison */
  .compare-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .compare-item {
    display: flex;
    gap: 10px;
    padding: 12px;
    background: #ffffff04;
    border-radius: 12px;
    border: 1px solid var(--border);
    animation: slideUp 0.3s ease;
  }

  .compare-item .ci-badge {
    flex-shrink: 0;
    width: 60px;
    text-align: center;
    padding-top: 2px;
  }

  .compare-item .ci-badge .emoji { font-size: 16px; }
  .compare-item .ci-badge .type { font-size: 11px; font-weight: 700; color: var(--purple); }

  .compare-item .ci-content {
    flex: 1;
    font-size: 13px;
    line-height: 1.7;
    color: #ccc;
  }

  .compare-item .ci-meaning {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
    font-style: italic;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 16px; color: #555; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; color: #444; line-height: 1.7; }

  .example-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-top: 16px;
  }

  .example-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: #888;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .example-chip:hover {
    border-color: var(--purple);
    color: var(--purple);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: #333;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
</style>
</head>
<body>

<div class="hero">
  <div class="badge">v1.0 Beta</div>
  <h1>MBTI 카톡 해석기</h1>
  <p>친구 카톡을 복붙하면 MBTI별 진짜 속마음을 알려드려요</p>
</div>

<div class="container">

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('decode')" id="modeDecodeBtn">🔍 해석 모드</button>
    <button class="mode-btn" onclick="setMode('translate')" id="modeTranslateBtn">🔄 번역 모드</button>
    <button class="mode-btn" onclick="setMode('compare')" id="modeCompareBtn">⚡ 비교 모드</button>
  </div>

  <!-- MBTI Selection -->
  <div id="mbtiArea"></div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-box">
      <textarea id="msgInput" placeholder="친구 카톡을 여기에 붙여넣으세요...&#10;예) 아 ㅋㅋ 괜찮아~ 신경 안 써도 돼" rows="3"></textarea>
      <button class="send-btn" id="sendBtn" onclick="handleAnalyze()">분석</button>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="empty-state">
      <div class="icon">🔮</div>
      <h3>카톡 한 줄이면 속마음이 보여요</h3>
      <p>MBTI를 선택하고 친구의 메시지를 붙여넣어 보세요</p>
      <div class="example-chips">
        <button class="example-chip" onclick="fillExample('아 ㅋㅋ 괜찮아~ 신경 안 써도 돼')">괜찮아~ 신경 안 써도 돼</button>
        <button class="example-chip" onclick="fillExample('아니 진짜 화 안 났어')">진짜 화 안 났어</button>
        <button class="example-chip" onclick="fillExample('ㅇㅇ 알겠어')">ㅇㅇ 알겠어</button>
        <button class="example-chip" onclick="fillExample('나 아무거나 먹어도 돼')">아무거나 먹어도 돼</button>
        <button class="example-chip" onclick="fillExample('솔직히 그때 좀 서운했어')">솔직히 좀 서운했어</button>
        <button class="example-chip" onclick="fillExample('ㅎㅎ 재밌었어 고마워')">ㅎㅎ 재밌었어 고마워</button>
      </div>
    </div>
  </div>

</div>

<div class="footer">MBTI 카톡 해석기 — 재미로만 봐주세요 😉</div>

<script>

// ===== ANALYSIS ENGINE =====
function analyzeMessage(text) {
  const lower = text.toLowerCase();
  const keywords = [];
  const emotions = [];

  // Keyword detection
  const patterns = [
    { keys: ['괜찮', '괜챦', 'ㄱㅊ'], tag: 'okay', emotion: '회피/배려' },
    { keys: ['서운', '섭섭'], tag: 'hurt', emotion: '서운함' },
    { keys: ['화', '짜증', '열받', '빡'], tag: 'angry', emotion: '분노' },
    { keys: ['미안', 'ㅁㅇ', '미얀'], tag: 'sorry', emotion: '미안함/죄책감' },
    { keys: ['고마', 'ㄱㅁ', '고맙', '감사'], tag: 'thanks', emotion: '감사' },
    { keys: ['좋아', '좋다', '좋네', '좋겠'], tag: 'like', emotion: '호감/기쁨' },
    { keys: ['싫어', '싫다', '별로'], tag: 'dislike', emotion: '거부감' },
    { keys: ['사랑', '좋아해'], tag: 'love', emotion: '애정' },
    { keys: ['아무거나', '뭐든', '상관없', '다 좋아'], tag: 'anything', emotion: '무관심/배려/귀찮음' },
    { keys: ['ㅇㅇ', 'ㅇㅋ', '알겠', 'ㄱㄱ'], tag: 'short', emotion: '담백/귀찮음/동의' },
    { keys: ['ㅋㅋ', 'ㅎㅎ', 'ㅋㅋㅋ'], tag: 'laugh', emotion: '유머/어색함/다양' },
    { keys: ['아니', '안 그래', '아닌데'], tag: 'deny', emotion: '부정/방어' },
    { keys: ['몰라', '모르겠'], tag: 'dunno', emotion: '회피/혼란' },
    { keys: ['보고싶', '보고 싶'], tag: 'miss', emotion: '그리움' },
    { keys: ['힘들', '지치', '피곤'], tag: 'tired', emotion: '지침/힘듦' },
    { keys: ['신경 안', '신경쓰지', '신경 쓰지'], tag: 'dontcare', emotion: '배려/회피' },
    { keys: ['재밌', '재미'], tag: 'fun', emotion: '즐거움' },
  ];

  patterns.forEach(p => {
    if (p.keys.some(k => text.includes(k))) {
      keywords.push(p.tag);
      if (!emotions.includes(p.emotion)) emotions.push(p.emotion);
    }
  });

  if (keywords.length === 0) keywords.push('general');
  if (emotions.length === 0) emotions.push('중립');

  return { keywords, emotions };
}

// ===== RENDER =====
function handleAnalyze() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  if (currentMode !== 'compare' && !selectedMBTI) {
    alert('MBTI를 먼저 선택해주세요!');
    return;
  }

  const results = document.getElementById('results');
  results.innerHTML = '';

  if (currentMode === 'decode') {
    renderDecode(text, selectedMBTI);
  } else if (currentMode === 'translate') {
    renderTranslate(text, selectedMBTI);
  } else if (currentMode === 'compare') {
    renderCompare(text);
  }
}

function renderDecode(text, type) {
  const data = MBTI[type];
  const result = decode(text, type);
  const results = document.getElementById('results');

  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <div class="card-header">
      <span class="mbti-emoji">${data.emoji}</span>
      <span class="mbti-badge">${type}</span>
      <span class="mbti-name">${data.name}이(가) 이 말을 했다면...</span>
    </div>
    <div class="result-body">
      <div class="original-msg">${escapeHtml(text)}</div>

      <div class="decode-section">
        <div class="decode-label"><span class="icon">💭</span> 진짜 속마음</div>
        <div class="decode-text meaning">${result.meaning}</div>
      </div>

      <div class="decode-section">
        <div class="decode-label"><span class="icon">🫀</span> 감정 상태</div>
        <div class="decode-text emotion">${result.emotion}</div>
      </div>

      <div class="decode-section">
        <div class="decode-label"><span class="icon">💡</span> 이렇게 대답하세요</div>
        <div class="decode-text response">${result.tip}</div>
      </div>

      <div class="decode-section">
        <div class="decode-label"><span class="icon">⚠️</span> 이건 절대 하지 마세요</div>
        <div class="decode-text caution">${result.caution}</div>
      </div>
    </div>
  `;
  results.appendChild(card);

  // Add "다른 MBTI로 보기" hint
  const hint = document.createElement('div');
  hint.style.cssText = 'text-align:center; padding:16px; font-size:12px; color:#555;';
  hint.textContent = '다른 MBTI를 선택하고 다시 분석해보세요!';
  results.appendChild(hint);
}

function renderTranslate(text, type) {
  const data = MBTI[type];
  const translated = translateMsg(text, type);
  const results = document.getElementById('results');

  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <div class="card-header">
      <span class="mbti-emoji">${data.emoji}</span>
      <span class="mbti-badge">${type}</span>
      <span class="mbti-name">${data.name}이(가) 같은 말을 한다면...</span>
    </div>
    <div class="result-body">
      <div class="original-msg">${escapeHtml(text)}</div>
      <div class="decode-section">
        <div class="decode-label"><span class="icon">🗣️</span> ${type}의 버전</div>
        <div class="decode-text meaning">${translated}</div>
      </div>
      <div class="decode-section">
        <div class="decode-label"><span class="icon">📱</span> ${type}의 카톡 스타일</div>
        <div class="decode-text response">${data.texting}</div>
      </div>
    </div>
  `;
  results.appendChild(card);

  // Compare all button
  const btn = document.createElement('button');
  btn.className = 'example-chip';
  btn.style.cssText = 'display:block; margin:12px auto; padding:10px 24px; font-size:13px;';
  btn.textContent = '🔄 16개 MBTI 전부 번역 보기';
  btn.onclick = () => {
    btn.remove();
    renderCompare(text);
  };
  results.appendChild(btn);
}

function renderCompare(text) {
  const results = document.getElementById('results');
  const grid = document.createElement('div');
  grid.className = 'compare-grid';

  const types = Object.keys(MBTI);
  types.forEach((type, i) => {
    setTimeout(() => {
      const data = MBTI[type];
      const translated = translateMsg(text, type);
      const item = document.createElement('div');
      item.className = 'compare-item';
      item.innerHTML = `
        <div class="ci-badge">
          <div class="emoji">${data.emoji}</div>
          <div class="type">${type}</div>
        </div>
        <div class="ci-content">
          ${translated}
          <div class="ci-meaning">${data.name} · ${data.style.split('.')[0]}</div>
        </div>
      `;
      grid.appendChild(item);
    }, i * 80);
  });

  results.appendChild(grid);
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter key
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleAnalyze();
  }
});
