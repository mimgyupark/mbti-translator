<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 카톡 해석기</title>
<meta name="description" content="친구의 카톡을 붙여넣으면 MBTI별 진짜 속마음을 알려드려요">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#faf9f7;
  --surface:#fff;
  --surface2:#f5f3f0;
  --border:#e8e5e0;
  --text:#1a1a1a;
  --text2:#6b6560;
  --text3:#a09890;
  --accent:#5b4cdb;
  --accent-light:#ede9ff;
  --accent2:#e8457a;
  --accent2-light:#ffeef4;
  --green:#1a9960;
  --green-light:#e6f9f0;
  --orange:#e07820;
  --orange-light:#fff4e6;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --shadow-lg:0 4px 24px rgba(0,0,0,.08);
  --radius:16px;
}

body{
  font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ===== LAYOUT ===== */
.app{
  max-width:480px;
  margin:0 auto;
  padding:0 16px 40px;
}

/* ===== HEADER ===== */
.header{
  text-align:center;
  padding:48px 0 32px;
}

.header .logo{
  width:56px;height:56px;
  border-radius:16px;
  background:linear-gradient(135deg,#5b4cdb,#8b5cf6);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:28px;
  margin-bottom:16px;
  box-shadow:0 4px 16px rgba(91,76,219,.25);
}

.header h1{
  font-size:22px;font-weight:800;
  color:var(--text);
  margin-bottom:6px;
  letter-spacing:-0.5px;
}

.header p{
  font-size:14px;color:var(--text3);
  font-weight:400;
}

/* ===== MBTI SELECTOR ===== */
.section-label{
  font-size:12px;font-weight:600;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:10px;
  padding-left:2px;
}

.mbti-area{margin-bottom:20px}

.mbti-group{margin-bottom:12px}

.mbti-group-title{
  font-size:11px;
  color:var(--text3);
  margin-bottom:6px;
  padding-left:4px;
  font-weight:500;
}

.mbti-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.mbti-chip{
  display:flex;flex-direction:column;align-items:center;
  gap:2px;
  padding:10px 0;
  border:1.5px solid var(--border);
  border-radius:12px;
  background:var(--surface);
  cursor:pointer;
  transition:all .2s ease;
  font-family:inherit;
  position:relative;
  overflow:hidden;
}

.mbti-chip::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  opacity:0;transition:opacity .2s;
}

.mbti-chip:hover{
  border-color:var(--accent);
  transform:translateY(-1px);
  box-shadow:var(--shadow);
}

.mbti-chip.active{
  border-color:var(--accent);
  background:var(--accent-light);
}

.mbti-chip.active::before{opacity:0}

.mbti-chip .icon{font-size:18px;position:relative;z-index:1}
.mbti-chip .name{font-size:11px;font-weight:700;color:var(--text);position:relative;z-index:1;letter-spacing:.5px}
.mbti-chip .sub{font-size:9px;color:var(--text3);position:relative;z-index:1}
.mbti-chip.active .name{color:var(--accent)}
.mbti-chip.active .sub{color:var(--accent)}

/* ===== INPUT CARD ===== */
.input-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:20px;
  box-shadow:var(--shadow);
  transition:border-color .2s;
}

.input-card:focus-within{
  border-color:var(--accent);
  box-shadow:var(--shadow),0 0 0 3px rgba(91,76,219,.08);
}

.input-card textarea{
  width:100%;
  border:none;
  outline:none;
  resize:none;
  font-family:inherit;
  font-size:15px;
  line-height:1.7;
  color:var(--text);
  background:transparent;
  min-height:72px;
}

.input-card textarea::placeholder{color:var(--text3)}

.input-actions{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--border);
}

.mode-pills{
  display:flex;gap:4px;
}

.mode-pill{
  padding:6px 12px;
  border-radius:20px;
  border:1px solid var(--border);
  background:transparent;
  font-size:12px;
  font-weight:500;
  color:var(--text2);
  cursor:pointer;
  font-family:inherit;
  transition:all .2s;
}

.mode-pill:hover{border-color:var(--accent);color:var(--accent)}
.mode-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.submit-btn{
  padding:8px 24px;
  border-radius:20px;
  border:none;
  background:var(--accent);
  color:#fff;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  font-family:inherit;
  transition:all .2s;
  box-shadow:0 2px 8px rgba(91,76,219,.2);
}

.submit-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(91,76,219,.3);
}

.submit-btn:active{transform:scale(.97)}

/* ===== EXAMPLE CHIPS ===== */
.examples{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:24px;
}

.ex-chip{
  padding:6px 14px;
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--surface);
  font-size:12px;color:var(--text2);
  cursor:pointer;font-family:inherit;
  transition:all .15s;
  white-space:nowrap;
}

.ex-chip:hover{
  background:var(--accent-light);
  color:var(--accent);
  border-color:var(--accent);
}

/* ===== RESULTS ===== */
.results{display:flex;flex-direction:column;gap:16px}

/* Decode Card */
.decode-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
  animation:fadeUp .4s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

.decode-card .card-top{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}

.card-top .avatar{
  width:36px;height:36px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  background:var(--accent-light);
}

.card-top .info .type-name{
  font-size:14px;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:6px;
}

.card-top .info .type-name span{
  font-size:11px;font-weight:600;color:var(--accent);
  background:var(--accent-light);padding:2px 8px;border-radius:6px;
}

.card-top .info .type-desc{font-size:11px;color:var(--text3);margin-top:1px}

.decode-card .card-body{padding:16px}

.original-bubble{
  background:var(--surface2);
  border-radius:14px;
  padding:12px 16px;
  font-size:13px;color:var(--text2);
  line-height:1.6;
  margin-bottom:16px;
  position:relative;
  border-left:3px solid var(--border);
}

.insight-block{margin-bottom:14px}
.insight-block:last-child{margin-bottom:0}

.insight-label{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:6px;
}

.insight-label.mind{color:var(--accent2)}
.insight-label.emotion{color:var(--orange)}
.insight-label.tip{color:var(--green)}
.insight-label.warn{color:#c53030}

.insight-text{
  font-size:14px;line-height:1.8;
  color:var(--text);
  padding:12px 14px;
  border-radius:12px;
  word-break:keep-all;
}

.insight-text.mind{background:var(--accent2-light)}
.insight-text.emotion{background:var(--orange-light)}
.insight-text.tip{background:var(--green-light)}
.insight-text.warn{background:#fff5f5}

/* Compare items */
.compare-list{display:flex;flex-direction:column;gap:8px}

.compare-row{
  display:flex;gap:12px;
  padding:14px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;
  animation:fadeUp .35s ease;
  transition:border-color .2s;
}

.compare-row:hover{border-color:var(--accent)}

.compare-row .cr-left{
  flex-shrink:0;width:52px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}

.compare-row .cr-left .emoji{font-size:20px}
.compare-row .cr-left .mbti{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.5px}

.compare-row .cr-right{flex:1}
.compare-row .cr-right .cr-text{font-size:13px;line-height:1.7;color:var(--text)}
.compare-row .cr-right .cr-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* Translate Card */
.translate-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
  animation:fadeUp .4s ease;
}

.translate-card .card-top{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}

.translate-card .card-body{padding:16px}

.translated-bubble{
  background:linear-gradient(135deg,#f0ecff,#fce8f0);
  border-radius:16px;
  padding:16px 18px;
  font-size:15px;
  line-height:1.8;
  color:var(--text);
  word-break:keep-all;
  position:relative;
}

.translated-bubble::after{
  content:'';position:absolute;bottom:-6px;left:20px;
  width:12px;height:12px;
  background:linear-gradient(135deg,#f0ecff,#fce8f0);
  border-radius:3px;
  transform:rotate(45deg);
}

.style-note{
  margin-top:16px;
  padding:12px 14px;
  background:var(--surface2);
  border-radius:12px;
  font-size:12px;color:var(--text2);
  line-height:1.6;
}

.style-note strong{color:var(--text);font-weight:600}

/* Empty state */
.empty{
  text-align:center;
  padding:48px 20px;
}

.empty .em-icon{
  width:72px;height:72px;
  border-radius:20px;
  background:var(--accent-light);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:36px;
  margin-bottom:16px;
}

.empty h3{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--text)}
.empty p{font-size:13px;color:var(--text3);line-height:1.7}

/* Compare All Button */
.compare-all-btn{
  display:block;width:100%;
  padding:12px;
  border:1.5px dashed var(--border);
  border-radius:14px;
  background:transparent;
  color:var(--text2);
  font-size:13px;font-weight:500;
  cursor:pointer;font-family:inherit;
  transition:all .2s;
}

.compare-all-btn:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--accent-light);
}

/* Footer */
.footer{
  text-align:center;
  padding:32px 0 16px;
  font-size:11px;
  color:var(--text3);
}

/* Responsive */
@media(max-width:400px){
  .mbti-chip{padding:8px 0}
  .mbti-chip .icon{font-size:16px}
  .mode-pills{gap:2px}
  .mode-pill{padding:5px 8px;font-size:11px}
}
</style>
</head>
<body>
<div class="app">

<!-- Header -->
<div class="header">
  <div class="logo">💬</div>
  <h1>MBTI 카톡 해석기</h1>
  <p>친구 카톡을 복붙하면 속마음을 알려드려요</p>
</div>

<!-- MBTI Selector -->
<div class="section-label">MBTI 선택</div>
<div class="mbti-area" id="mbtiArea"></div>

<!-- Input -->
<div class="input-card">
  <textarea id="msgInput" placeholder="친구 카톡을 여기에 복붙하세요&#10;&#10;예) 아 ㅋㅋ 괜찮아~ 신경 안 써도 돼" rows="3"></textarea>
  <div class="input-actions">
    <div class="mode-pills">
      <button class="mode-pill active" data-mode="decode" onclick="setMode('decode')">해석</button>
      <button class="mode-pill" data-mode="translate" onclick="setMode('translate')">번역</button>
      <button class="mode-pill" data-mode="compare" onclick="setMode('compare')">전체비교</button>
    </div>
    <button class="submit-btn" onclick="handleAnalyze()">분석하기</button>
  </div>
</div>

<!-- Example Chips -->
<div class="examples">
  <button class="ex-chip" onclick="fill('괜찮아~ 신경 안 써도 돼')">괜찮아~ 신경 안 써도 돼</button>
  <button class="ex-chip" onclick="fill('아니 진짜 화 안 났어')">진짜 화 안 났어</button>
  <button class="ex-chip" onclick="fill('ㅇㅇ 알겠어')">ㅇㅇ 알겠어</button>
  <button class="ex-chip" onclick="fill('나 아무거나 먹어도 돼')">아무거나 먹어도 돼</button>
  <button class="ex-chip" onclick="fill('솔직히 그때 좀 서운했어')">솔직히 좀 서운했어</button>
  <button class="ex-chip" onclick="fill('ㅎㅎ 재밌었어 고마워')">ㅎㅎ 재밌었어 고마워</button>
</div>

<!-- Results -->
<div class="results" id="results">
  <div class="empty">
    <div class="em-icon">🔮</div>
    <h3>카톡 한 줄이면 속마음이 보여요</h3>
    <p>위에서 MBTI 선택 → 메시지 복붙 → 분석하기!</p>
  </div>
</div>

<div class="footer">재미로만 봐주세요 · MBTI 카톡 해석기</div>

</div>

// Build grid
const area=document.getElementById('mbtiArea');
GRP.forEach(g=>{
  const div=document.createElement('div');
  div.className='mbti-group';
  div.innerHTML=`<div class="mbti-group-title">${g.l}</div><div class="mbti-row">${
    g.t.map(t=>`<button class="mbti-chip" data-t="${t}" onclick="pick('${t}')">

    </button>`).join('')
  }</div>`;
  area.appendChild(div);
});

function pick(t){
  sel=t;
  document.querySelectorAll('.mbti-chip').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-pill').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
}

function fill(t){document.getElementById('msgInput').value=t;document.getElementById('msgInput').focus()}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

    {k:['고마','ㄱㅁ','고맙','감사'],tag:'thanks'},
    {k:['좋아','좋다','좋네'],tag:'like'},
    {k:['싫어','싫다','별로'],tag:'dislike'},
    {k:['사랑','좋아해'],tag:'love'},
    {k:['아무거나','뭐든','상관없'],tag:'anything'},
    {k:['ㅇㅇ','ㅇㅋ','알겠','ㄱㄱ'],tag:'short'},
    {k:['ㅋㅋ','ㅎㅎ'],tag:'laugh'},
    {k:['아니','안 그래'],tag:'deny'},

    {k:['보고싶','보고 싶'],tag:'miss'},

// ===== RENDER =====
function handleAnalyze(){
  const text=document.getElementById('msgInput').value.trim();
  if(!text) return;
  if(mode!=='compare'&&!sel){alert('MBTI를 먼저 선택해주세요!');return}
  const res=document.getElementById('results');
  res.innerHTML='';
  if(mode==='decode') renderDecode(text,sel);
  else if(mode==='translate') renderTranslate(text,sel);
  else renderCompare(text);
}

function renderDecode(text,type){
  const d=M[type], tag=detect(text);
  const dec=DEC[type];
  const r=dec[tag]||dec.general;
  const res=document.getElementById('results');
  res.innerHTML=`
    <div class="decode-card">
      <div class="card-top">
        <div class="avatar">${d.e}</div>
        <div class="info">
          <div class="type-name">${d.n} <span>${type}</span></div>
          <div class="type-desc">${d.s.split('.')[0]}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="original-bubble">${esc(text)}</div>
        <div class="insight-block">
          <div class="insight-label mind">💭 진짜 속마음</div>
          <div class="insight-text mind">${r.m}</div>
        </div>
        <div class="insight-block">
          <div class="insight-label emotion">🫀 감정 상태</div>
          <div class="insight-text emotion">${r.e}</div>
        </div>
        <div class="insight-block">
          <div class="insight-label tip">💡 이렇게 대답하세요</div>
          <div class="insight-text tip">${r.t}</div>
        </div>
        <div class="insight-block">
          <div class="insight-label warn">⚠️ 절대 하지 마세요</div>
          <div class="insight-text warn">${r.w}</div>
        </div>
      </div>
    </div>
    <button class="compare-all-btn" onclick="setMode('compare');handleAnalyze()">16개 MBTI 전부 비교하기</button>
  `;
}

function renderTranslate(text,type){
  const d=M[type], tag=detect(text);
  const t=TR[type];
  const translated=t[tag]||t.general;
  const res=document.getElementById('results');
  res.innerHTML=`
    <div class="translate-card">
      <div class="card-top">
        <div class="avatar">${d.e}</div>
        <div class="info">
          <div class="type-name">${d.n} <span>${type}</span></div>
          <div class="type-desc">같은 말을 ${type}이 한다면...</div>
        </div>
      </div>
      <div class="card-body">
        <div class="original-bubble">${esc(text)}</div>
        <div class="translated-bubble">${translated}</div>
        <div class="style-note"><strong>📱 ${type}의 카톡 스타일:</strong> ${d.t}</div>
      </div>
    </div>
    <button class="compare-all-btn" onclick="setMode('compare');handleAnalyze()">16개 MBTI 전부 비교하기</button>
  `;
}

function renderCompare(text){
  const tag=detect(text);
  const res=document.getElementById('results');
  const list=document.createElement('div');
  list.className='compare-list';
  Object.keys(M).forEach((type,i)=>{
    setTimeout(()=>{
      const d=M[type], t=TR[type];
      const translated=t[tag]||t.general;
      const row=document.createElement('div');
      row.className='compare-row';
      row.innerHTML=`
        <div class="cr-left"><div class="emoji">${d.e}</div><div class="mbti">${type}</div></div>
        <div class="cr-right"><div class="cr-text">${translated}</div><div class="cr-sub">${d.n} · ${d.s.split('.')[0]}</div></div>
      `;
      list.appendChild(row);
    },i*60);
  });
  res.appendChild(list);
}

// Enter key
document.getElementById('msgInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleAnalyze()}
});
</script>
