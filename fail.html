<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 실패 - MBTI 카톡 해석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#faf9f7;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{max-width:420px;width:90%;background:#fff;border-radius:20px;padding:40px 28px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.icon{width:72px;height:72px;border-radius:50%;background:#fff5f5;display:inline-flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:20px}
h1{font-size:22px;font-weight:900;margin-bottom:8px;color:#e53e3e}
.desc{font-size:14px;color:#6b6560;line-height:1.7;margin-bottom:8px}
.code{font-size:12px;color:#a09890;margin-bottom:24px}
.btn{display:inline-block;padding:14px 36px;background:#5b4cdb;color:#fff;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;transition:all .2s}
.btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="card">
  <div class="icon">😢</div>
  <h1>결제가 실패했습니다</h1>
  <p class="desc" id="msg">결제 처리 중 문제가 발생했습니다</p>
  <p class="code" id="code"></p>
  <a href="/" class="btn">다시 시도하기</a>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const msg = params.get('message');
const code = params.get('code');
if (msg) document.getElementById('msg').textContent = msg;
if (code) document.getElementById('code').textContent = '오류 코드: ' + code;
</script>
</body>
</html>
